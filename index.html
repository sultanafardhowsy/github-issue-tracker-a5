<!DOCTYPE html>
<html lang="en" data-theme ="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Log in</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <!-- daisyui+tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<!-- icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
    *{
        font-family: "Outfit",sans-serif;
    }
</style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto" >
   
   <div class="logo w-[100px] mx-auto pt-20 pb-5">
    <img src="./assets/github-logo.png" alt="">
   
   </div>
    <h1 class="text-2xl font-bold text-center">GitHub Issues Tracker</h1>
    <p class="text-center text-slate-400">Sign in to manage your issues</p>
   <div class="form pt-10">
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Username</label>
          <input id="user-name"  type="text" class="input rounded-none bg-base-200" 
          value="" placeholder="Enter Username" />
          <p class="text-blue-600">Default: admin</p>
          <br>

          <label class="label text-neutral font-bold">Password</label>
          <input id="password-pin"  type="text" class="input rounded-none bg-base-200" placeholder="Enter Password" />
          <p class="text-blue-600">Default: admin123</p>
          
          <button id="login-btn" class="btn btn-primary rounded-none mt-4">Sign In</button>
        </fieldset>
      </div>
   </div>
   </div>
   <script src="script/login.js"></script>
</body>
</html>
